# ha-mealie-now-serving Lovelace Card
# https://github.com/bferd/ha-mealie-now-serving
#
# Paste this into a Manual card in your Home Assistant dashboard.
# Requires: Simple Swipe Card, card-mod (both via HACS Frontend)

type: vertical-stack
cards:
  - type: conditional
    conditions:
      - condition: state
        entity: sensor.mealie_meal_slot
        state: breakfast
    card:
      type: custom:simple-swipe-card
      swipe_effect: fade
      auto_hide_pagination: 0
      auto_height: false
      loop_mode: infinite
      enable_auto_swipe: true
      auto_swipe_interval: 5000
      cards:
        - type: vertical-stack
          visibility:
            - condition: state
              entity: sensor.mealie_breakfast_1
              state_not: none
          cards:
            - type: picture
              image_entity: image.mealie_breakfast_1_image
              tap_action:
                action: none
              card_mod:
                style: |
                  ha-card { border-radius: 12px 12px 0 0; margin-bottom: 0; }
                  img { object-fit: cover; width: 100%; height: 300px; border-radius: 12px 12px 0 0; }
            - type: markdown
              content: >-
                🍳 **Now Serving - Breakfast** · {{ states('sensor.mealie_breakfast_1') }}
              card_mod:
                style: |
                  ha-card { border-radius: 0 0 12px 12px; background: rgba(0,0,0,0.75); margin-top: 0; padding: 4px 12px; }
                  ha-markdown { color: white !important; }
