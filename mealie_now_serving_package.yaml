  - image:
      - name: "Mealie Breakfast 1 Image"
        url: "{{ states('input_text.mealie_url') }}/api/media/recipes/{{ states('sensor.mealie_breakfast_1_id') }}/images/min-original.webp"
      - name: "Mealie Breakfast 2 Image"
        url: "{{ states('input_text.mealie_url') }}/api/media/recipes/{{ states('sensor.mealie_breakfast_2_id') }}/images/min-original.webp"
