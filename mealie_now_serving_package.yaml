        unique_id: mealie_lunch_1_id
        force_update: true
        value_template: >
          {% set meals = value_json | selectattr('entryType', 'eq', 'lunch') | list %}
          {{ meals[0].recipe.id if meals | length > 0 else 'none' }}
      - name: Mealie Lunch 2
        unique_id: mealie_lunch_2
        force_update: true
        value_template: >
