          {{ meals[2].recipe.id if meals | length > 2 else 'none' }}
      - name: Mealie Lunch 4
        unique_id: mealie_lunch_4
        force_update: true
        value_template: >
          {% set meals = value_json | selectattr('entryType', 'eq', 'lunch') | list %}
          {{ meals[3].recipe.name if meals | length > 3 else 'none' }}
