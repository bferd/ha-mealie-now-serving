        unique_id: mealie_lunch_4_id
        force_update: true
        value_template: >
          {% set meals = value_json | selectattr('entryType', 'eq', 'lunch') | list %}
          {{ meals[3].recipe.id if meals | length > 3 else 'none' }}

      # --- SUPPER (dinner + side + dessert combined, up to 6) ---
